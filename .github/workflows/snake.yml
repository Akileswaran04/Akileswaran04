name: Refresh Contribution Heatmap

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "auto: refresh contribution data"
          git push
