name: Contribution Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake (Frost & Obsidian)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?color_snake=%23e0f2fe&color_dots=%230a0e14,%231a2533,%232d4a66,%234a7c99,%23e0f2fe
            dist/github-snake.svg?color_snake=%234a7c99&color_dots=%23f5f0eb,%23d4c9b8,%23a8977a,%237a6046,%234a7c99

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
